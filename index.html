<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Ravi+Prakash&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="section-1 h-screen w-full relative overflow-hidden ">
        <div id="slider" class="flex transition-transform duration-500 h-full w-full absolute ">
            <img src="college image.jpg" class="w-full h-full object-cover flex-shrink-0 ">
            <img src="college image 2.webp" class="w-full h-full object-cover flex-shrink-0 ">
            <img src="college image 3.jpg" class="w-full h-full object-cover flex-shrink-0 ">
  </div>
  <div class="absolute inset-0 bg-black/40"></div>
        <div class="banner h-[88px] w-full absolute top-0 flex items-center justify-around gap-30 px-15 py-10 fixed">
            <div class="h-[70px] w-[70px] flex items-center justify-around">
                <img class="cursor-pointer " src="ptu.png" alt="">
                <h2 class="text-3xl text-white leading-4 font-bold cursor-pointer">
                    PTU<br>
                    <span class="text-sm font-semibold">
                        Amritsar
                    </span>
                </h2>
            </div>
            <ul class="flex items-center justify-around gap-16 text-white font-medium text-sm">
                <li>Home</li>
                <li>Courses</li>
                <li>Placements</li>
                <li>Research & Innovation</li>
                <li>Faqs</li>
            </ul>

        <button class="flex items-center gap-2 px-6 py-3 bg-blue-600 text-white rounded-lg 
        hover:bg-blue-800 transform hover:scale-105 
        transition duration-300 shadow-md hover:shadow-lg">

          Apply Now
         <span class="group-hover:translate-x-2 transition duration-300">→</span>

        </button>
        </div>

        <div id="text-cont" class="absolute top-1/2 left-10 transform -translate-y-1/2 text-white max-w-xl">

        <h1 class="text-5xl font-bold leading-tight">
            Shaping the Future of Engineers
        </h1>

        <p class="mt-4 text-lg">
            Empowering students with knowledge and innovation.
        </p>

        <button class="mt-6 px-6 py-3 bg-blue-600 rounded-lg hover:bg-blue-800 transform hover:scale-105 
        transition duration-300 shadow-md hover:shadow-lg">
            Apply Now →
        </button>

        </div>
    </div>
    
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
